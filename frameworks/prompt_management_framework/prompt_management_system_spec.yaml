# ============================================================================
# Prompt Management System Specification
# 用於 AI Workflow 的 Prompt 版本管理系統設計規格
# ============================================================================
# 📖 使用方式：
#   將此 YAML 的內容作為 prompt 提供給 AI（Claude、GPT、Gemini 等），
#   AI 即可根據此規格為你的專案建構一套完整的 Prompt 管理系統。
#
# 🎯 適用場景：
#   - 多階段 AI Workflow（如報告生成、內容分析、數據處理）
#   - 需要頻繁調整 Prompt 的專案
#   - 需要版本管理和 A/B 測試的場景
#
# 📦 參考實作：
#   本規格基於「台美 ETF 淨流量分析月報」專案的實際經驗編寫，
#   已在生產環境驗證可行性。
#
# 🔖 版本：v1.6.0 (2026-02-24)
# ============================================================================

metadata:
  name: "Prompt Management System"
  version: "1.6.0"
  description: "AI Workflow 的 Prompt 版本管理系統 - 提取、編輯、版本控制、Baseline 管理、預覽執行一致性、輸入驗證、Stage 間統一讀取、Workflow 結果摘要"
  author: "John1106John"
  created_at: "2026-02-09"
  updated_at: "2026-02-24"
  license: "MIT"
  compatibility:
    - "多階段 AI Workflow"
    - "Streamlit UI"
    - "任何 Python 3.10+ 專案"

system_overview:
  name: "AI Workflow Prompt Management System"
  purpose: |
    在多階段 AI workflow 中，每個階段 (stage) 都會呼叫 LLM API 並使用 prompt。
    本系統提供：
    1. 從 Python 腳本中自動提取 prompt 常數
    2. 在 Streamlit UI 中即時編輯 prompt
    3. 草稿暫存（不影響執行）與正式寫回腳本（影響執行）
    4. 每次修改腳本前自動備份
    5. 輸出版本管理（每次執行後快照，可切換主要版本）
  tech_stack:
    language: Python 3.10+
    ui_framework: Streamlit
    storage: 純檔案系統（JSON + Markdown），無需資料庫
    dependencies:
      - streamlit   # UI 框架
      - pathlib     # 路徑操作（標準庫）
      - json        # JSON 序列化（標準庫）
      - shutil      # 檔案複製/備份（標準庫）
      - re          # 正則表達式提取 prompt（標準庫）
      - datetime    # 時間戳記（標準庫）

# ============================================================================
# 核心架構
# ============================================================================

architecture:
  design_principle: |
    「Prompt 即程式碼」— prompt 直接寫在 .py 腳本中作為 module-level 常數，
    是 single source of truth。

    ⭐ 核心原則：腳本即唯一來源
    - get_prompts() 永遠從 .py 腳本提取（regex），不優先讀取 JSON 快取
    - 避免 JSON 快取與腳本不同步的 bug
    - JSON 快取僅用於草稿暫存，不作為讀取來源

    資料流：
    .py 腳本 (PROMPT = """...""")
        ↓ extract (regex) ← get_prompts() 永遠走這條路
    UI session_state (即時編輯)
        ↓ save_draft → JSON 草稿（不影響執行）
        ↓ update_script → 寫回 .py（影響執行）

    ⭐ 預覽與執行共用邏輯（build_prompts 模式）：
    .py 腳本中的 build_prompts(year, month, prompt_texts=None)
        ↑ 腳本 main() 呼叫（prompt_texts=None，用 module-level 常數）
        ↑ UI 預覽呼叫（prompt_texts=edited_dict，用 UI 編輯中的文字）
    → 確保預覽與執行 100% 使用相同的組裝邏輯

    ⭐ Stage 間依賴統一讀取（stage_io 模式）：
    utils/stage_io.py 中的 read_stage_output(stage_num, year, month, source)
        ↑ build_prompts(dep_source) 內部呼叫（讀取前置 stage 輸出）
        ↑ source='active'（UI 預覽/執行/CLI）→ 活動版本（★）優先
        ↑ source='temp'（一鍵 workflow）→ 只讀 temp/
    → 透過 dep_source 參數鏈明確傳遞呼叫者意圖

  components:
    - name: PromptManager
      role: 後端核心類別
      responsibilities:
        - 從 .py 腳本提取 prompt（regex）— 唯一讀取來源
        - 將修改寫回 .py 腳本
        - 自動備份（修改前）
        - 列出/還原備份
        - Baseline 管理（儲存、比較、還原基準版本）

    - name: Baseline Manager (PromptManager 內建)
      role: Prompt 基準版本管理
      responsibilities:
        - 將目前腳本 prompt 儲存為 baseline（參考基準）
        - 比較目前腳本與 baseline 的差異
        - 從 baseline 還原腳本（自動備份後覆蓋）
        - Baseline 不可刪除，僅能覆蓋更新

    - name: UI Prompt Editor (Streamlit)
      role: 前端互動介面
      responsibilities:
        - 顯示各 stage 的 prompt（text_area 編輯器）
        - 顯示字數、行數、是否已修改
        - 暫存草稿（JSON）
        - 載入草稿 / 刪除草稿
        - 更新到腳本
        - 從腳本重新載入
        - Baseline 比較（與基準版本比對差異）
        - 草稿記錄中置頂顯示 Baseline（可載入，不可刪除）

    - name: Version Manager
      role: 輸出版本控制
      responsibilities:
        - 每次成功執行後自動快照輸出
        - 管理 active version（追蹤哪個版本是當前使用的）
        - 切換/刪除版本
        - 最終組裝時可選擇各 stage 的特定版本

    - name: StageOutputReader
      role: Stage 間依賴的統一讀取模組
      responsibilities:
        - 提供 read_stage_output(stage_num, year, month, source) 單一讀取函數
        - source='active'（預設）：活動版本（★）優先，回退 temp/（UI 預覽/執行用）
        - source='temp'：只讀 temp/，忽略活動版本（一鍵 workflow 用）
        - 被所有 build_prompts() 內部使用，透過 dep_source 參數傳遞讀取模式

# ============================================================================
# 目錄結構
# ============================================================================

directory_structure:
  description: |
    以下為 prompt 管理相關的目錄結構。
    {project_root} 是你的專案根目錄。
  layout:
    prompts/: "JSON 快取，每個 stage 一個檔案"
    prompts/baselines/: "Baseline 基準版本（不可刪除，僅能覆蓋更新）"
    prompts/backups/: "自動備份（.json 和 .py），修改前自動建立"
    prompts/drafts/: "UI 暫存草稿，不影響實際執行，可刪除"
    temp/versions/{YYYYMM}/stage{N}/: "輸出版本快照"
    temp/active_versions_{YYYYMM}.json: "記錄各 stage 的主要版本 ID"
  file_naming:
    json_cache: "stage{N}_prompts.json"
    baseline: "stage{N}_baseline.json"
    draft: "stage{N}_{YYYYMMDD_HHMMSS}.json"
    backup_json: "stage{N}_prompts_{YYYYMMDD_HHMMSS}.json"
    backup_script: "{script_stem}_{YYYYMMDD_HHMMSS}.py"
    version_snapshot:
      individual: "v{YYYYMMDD_HHMMSS}.md"
      workflow: "v{YYYYMMDD_HHMMSS}_workflow.md"

# ============================================================================
# 共用資料格式化架構（Preview Consistency Pattern）
# ============================================================================

shared_formatters:
  design_principle: |
    ⭐ **核心理念**：預覽與實際執行使用相同的程式碼，確保 100% 一致性

    問題背景：
    - 實際執行：Stage 腳本有自己的資料格式化邏輯
    - UI 預覽：UI 中重新實作相同的邏輯來生成預覽
    - 結果：兩份代碼，容易不一致 ❌

    解決方案：
    - 創建共用資料格式化模組（utils/data_formatter.py）
    - Stage 腳本和 UI 預覽都使用相同的函數
    - 單一來源原則（Single Source of Truth）✅

  architecture:
    pattern: |
      實際執行 Stage 腳本 ──┐
                           ├──> 共用資料格式化模組 (utils/data_formatter.py)
      UI 預覽功能 ────────┘

  implementation:
    step_1_create_shared_module:
      file: "utils/data_formatter.py"
      description: |
        創建共用資料格式化模組，包含所有資料讀取和格式化邏輯。
        每個函數對應一種資料格式化需求。

      design_principles:
        - "函數命名清晰（load_*, format_*, calculate_*）"
        - "完整的 docstring（包含 Args, Returns, Used by）"
        - "一致的錯誤處理"
        - "單一職責原則"

      example: |
        ```python
        # utils/data_formatter.py

        def load_us_etf_data(excel_file, year, month):
            """
            從 Excel 讀取指定月份的數據，轉為 markdown 表格

            Args:
                excel_file: Path 或 str，Excel 檔案路徑
                year: int, 年份
                month: int, 月份

            Returns:
                str: 格式化的 markdown 表格，或錯誤訊息

            Used by:
                - scripts/stages/stage1_xxx.py
                - ui_app.py (generate_dynamic_variables, Stage 1)
            """
            try:
                df = pd.read_excel(excel_file, sheet_name=f"{year}年{month}月數據")
                # 格式化邏輯...
                return formatted_table
            except Exception as e:
                return f"\n[警告] 無法讀取數據: {str(e)}\n"
        ```

    step_2_refactor_stage_scripts:
      description: |
        重構 Stage 腳本，移除本地的格式化邏輯，改用共用函數。

      before: |
        ```python
        # scripts/stages/stage1_xxx.py

        def load_data(file, year, month):  # ❌ 重複的邏輯
            df = pd.read_excel(file)
            # ... 大量格式化邏輯 ...
            return table

        def main(year, month):
            data = load_data(file, year, month)
        ```

      after: |
        ```python
        # scripts/stages/stage1_xxx.py

        from utils.data_formatter import load_us_etf_data  # ✅ 使用共用函數

        def main(year, month):
            # 直接使用共用函數
            data = load_us_etf_data(file, year, month)
        ```

    step_3_ui_preview_integration:
      description: |
        UI 預覽邏輯使用相同的共用函數，確保與實際執行一致。

      before: |
        ```python
        # ui_app.py

        def generate_dynamic_variables(stage_num, year, month):
            if stage_num == 1:
                # ❌ 自行實作，可能與實際執行不同
                df = pd.read_excel(file)
                table = df.to_markdown()  # 格式可能不同
        ```

      after: |
        ```python
        # ui_app.py

        from utils.data_formatter import load_us_etf_data  # ✅ 使用相同的共用函數

        def generate_dynamic_variables(stage_num, year, month):
            if stage_num == 1:
                # ✅ 使用共用函數，確保與實際執行相同
                data = load_us_etf_data(file, year, month)
                dynamic_vars["{{data}}"] = data
        ```

  benefits:
    - "✅ 保證一致性：預覽與實際執行使用完全相同的代碼"
    - "✅ 避免重複：單一來源原則（Single Source of Truth）"
    - "✅ 易於維護：修改邏輯只需要改一處"
    - "✅ 降低錯誤：減少因複製貼上導致的不一致"
    - "✅ 易於測試：只需測試共用函數一次"

  best_practices:
    function_naming:
      - "使用清晰的動詞 + 名詞：load_*, format_*, calculate_*"
      - "名稱反映功能：load_us_etf_data 而非 get_data"

    docstring_requirements: |
      必須包含：
      - 簡短描述
      - Args: 所有參數及說明
      - Returns: 返回值說明
      - Used by: 使用者列表（幫助追蹤影響範圍）

    error_handling:
      pattern: |
        try:
            # 主邏輯
            return formatted_data
        except Exception as e:
            # 統一的錯誤訊息格式
            return f"\n[警告] 無法讀取 {source}: {str(e)}\n"

    testing:
      - "為共用函數撰寫單元測試"
      - "測試預覽與實際執行的輸出一致性"
      - "使用 pytest 或 unittest 框架"

    version_control:
      - "修改共用函數時確保向下兼容"
      - "或同時更新所有使用者"
      - "記錄修改原因（commit message）"

  common_pitfalls:
    - name: "部分使用共用函數"
      problem: "某些 Stage 使用共用函數，某些自己實作"
      solution: "所有格式化邏輯都使用共用函數"

    - name: "修改共用函數後未更新所有使用者"
      problem: "修改函數後忘記測試所有 Stage"
      solution: "建立自動化測試，修改後自動驗證所有使用者"

    - name: "在共用函數中混入特定 Stage 邏輯"
      problem: "函數中使用 if stage_num == 1 等條件分支"
      solution: "每個函數專注單一職責，Stage 特定邏輯在 Stage 腳本中處理"

  verification:
    method_1_direct_comparison:
      description: "直接比對 Stage 執行輸出與 UI 預覽內容"
      steps:
        - "執行 Stage 腳本，生成輸出檔案"
        - "在 UI 中查看預覽內容"
        - "人工比對兩者是否一致"

    method_2_unit_testing:
      description: "使用單元測試驗證一致性"
      example: |
        ```python
        def test_preview_matches_actual():
            # 使用相同參數呼叫共用函數
            actual = load_us_etf_data(test_file, 2025, 12)

            # 模擬 UI 預覽邏輯
            preview = generate_dynamic_variables(1, 2025, 12, "202512")

            # 驗證一致性
            assert preview["{{data}}"] in actual
        ```

    method_3_check_imports:
      description: "檢查是否所有地方都使用共用函數"
      commands:
        - "grep -r 'def load_.*_data' scripts/stages/  # 應該只在 utils/data_formatter.py 中找到"
        - "grep -r 'from utils.data_formatter import' scripts/stages/"
        - "grep 'from utils.data_formatter import' ui_app.py"

# ============================================================================
# PromptManager 類別設計
# ============================================================================

prompt_manager_class:
  description: |
    核心後端類別，負責 prompt 的讀取、提取、儲存、寫回。
    不依賴 Streamlit，可獨立使用。

  constructor:
    parameters: []
    initialization:
      - "推導 project_root（通常 Path(__file__).parent.parent）"
      - "建立 prompts_dir、backup_dir 和 baseline_dir"
      - "定義 prompt_files 映射表：stage 名稱 → {json 路徑, 腳本路徑}"
    example: |
      self.project_root = Path(__file__).parent.parent
      self.prompts_dir = self.project_root / "prompts"
      self.backup_dir = self.prompts_dir / "backups"
      self.baseline_dir = self.prompts_dir / "baselines"
      self.prompts_dir.mkdir(exist_ok=True)
      self.backup_dir.mkdir(exist_ok=True)
      self.baseline_dir.mkdir(exist_ok=True)

  prompt_files_mapping:
    description: |
      字典，key 為 stage 的人類可讀名稱，value 包含：
      - file: JSON 快取路徑
      - script: 對應的 Python 腳本路徑
    example: |
      self.prompt_files = {
          "Stage 1：XXX": {
              "file": self.prompts_dir / "stage1_prompts.json",
              "script": self.project_root / "scripts" / "stages" / "stage1_xxx.py"
          },
          # ...依此類推
      }

  methods:
    extract_prompts_from_script:
      purpose: "從 Python 腳本中用 regex 提取 prompt 常數"
      input: "script_path (Path)"
      output: "dict[str, str]  # {變數名: prompt 內容}"
      regex_patterns:
        pattern_module_level_vars: |
          # 匹配 PROMPT = """...""" 或 PROMPT_XXX = """..."""
          r'(PROMPT(?:_\w+)?)\s*=\s*"""(.*?)"""'
          # 使用 re.DOTALL 使 . 匹配換行
        pattern_dict_format: |
          # 匹配 PROMPTS = {"key": """...""", ...}
          # 先找外層 dict，再提取各 key-value
          外層: r'PROMPTS\s*=\s*\{(.*?)\n\}'
          內層: r'"(\w+)":\s*"""(.*?)"""'
      important_notes:
        - "regex 必須用 re.DOTALL flag，因為 prompt 跨多行"
        - "PROMPT(?:_\\w+)? 同時匹配 PROMPT 和 PROMPT_XXX"
        - "無法提取動態 f-string prompt（如含有前置 stage 輸出的 prompt）"
        - "對動態 prompt 的 stage，應在 UI 設 prompt_key=None 並顯示說明"

    get_prompts:
      purpose: "取得指定 stage 的所有 prompt"
      logic: |
        ⭐ 永遠從腳本提取（不使用 JSON 快取），確保與執行一致：
        1. 確認 report_type 存在於 prompt_files 映射表
        2. 取得對應的 script 路徑
        3. 呼叫 extract_prompts_from_script(script_path) 提取
        4. 直接回傳結果（不寫入 JSON 快取）
      input: "report_type (str) — prompt_files 的 key"
      output: "dict[str, str]"
      important_notes:
        - "⚠️ 舊版設計會優先從 JSON 快取讀取，導致更新腳本後 UI 仍顯示舊版 prompt"
        - "新版永遠從 .py 腳本提取，徹底消除快取不同步問題"
        - "效能影響極小（regex 提取只需幾毫秒）"
      example: |
        def get_prompts(self, report_type):
            """獲取指定報告類型的 Prompts（直接從腳本提取，確保與執行一致）"""
            if report_type not in self.prompt_files:
                return {}
            script_file = self.prompt_files[report_type]["script"]
            return self.extract_prompts_from_script(script_file)

    save_prompts:
      purpose: "儲存 prompt 到 JSON 快取檔"
      logic: |
        1. 如果快取檔已存在且 create_backup=True → 複製為備份
        2. 寫入新的 JSON
      input: "report_type, prompts (dict), create_backup=True"

    update_script_prompts:
      purpose: "將修改後的 prompt 寫回 .py 腳本（影響實際執行）"
      logic: |
        1. 讀取腳本內容
        2. 建立腳本備份（.py 備份到 backups/）
        3. 偵測腳本格式：
           a. module-level 變數 (PROMPT = """...""")
           b. 字典格式 (PROMPTS = {"key": """..."""})
        4. 用 regex 替換對應的 prompt 內容
        5. 寫回腳本
        ⭐ 不需要同步 JSON 快取 — 因為 get_prompts() 永遠從腳本提取
      important_notes:
        - "偵測 regex 和提取 regex 必須一致（都要支援 PROMPT 和 PROMPT_XXX）"
        - "替換前一定要備份，因為這是不可逆操作"
        - "替換格式：{var_name} = \"\"\"\\n{new_content}\\n\"\"\""
        - "⚠️ 不要在此方法中加 save_prompts() 同步 JSON — 多餘且可能造成混淆"

    list_backups:
      purpose: "列出指定 stage 的所有備份"
      output: "list[{file, time}]，按時間倒序"

    restore_from_backup:
      purpose: "從備份還原 JSON 快取"

    # ===== Baseline 管理方法 =====

    _stage_num:
      purpose: "從 report_type 名稱提取 Stage 編號（內部輔助方法）"
      input: "report_type (str)"
      output: "int | None"
      example: |
        def _stage_num(self, report_type):
            for key in self.prompt_files:
                if key == report_type:
                    try:
                        return int(key.split("：")[0].replace("Stage ", ""))
                    except (ValueError, IndexError):
                        return None
            return None

    get_baseline:
      purpose: "讀取指定 Stage 的 baseline prompt"
      input: "report_type (str)"
      output: "dict[str, str] — baseline prompt 內容，找不到回傳空 dict"
      logic: |
        1. 用 _stage_num() 取得 stage 編號
        2. 讀取 baselines/stage{N}_baseline.json
        3. 回傳 JSON 內容
      example: |
        def get_baseline(self, report_type):
            num = self._stage_num(report_type)
            if num is None:
                return {}
            baseline_file = self.baseline_dir / f"stage{num}_baseline.json"
            if not baseline_file.exists():
                return {}
            try:
                with open(baseline_file, 'r', encoding='utf-8') as f:
                    return json.load(f)
            except Exception:
                return {}

    save_baseline:
      purpose: "將目前腳本中的 prompt 儲存為 baseline（覆蓋現有 baseline）"
      input: "report_type (str)"
      output: "bool — 是否成功"
      logic: |
        1. 用 get_prompts() 取得目前腳本的 prompt
        2. 寫入 baselines/stage{N}_baseline.json
        ⚠️ Baseline 不可刪除，僅能覆蓋更新
      example: |
        def save_baseline(self, report_type):
            num = self._stage_num(report_type)
            if num is None:
                return False
            prompts = self.get_prompts(report_type)
            if not prompts:
                return False
            baseline_file = self.baseline_dir / f"stage{num}_baseline.json"
            try:
                with open(baseline_file, 'w', encoding='utf-8') as f:
                    json.dump(prompts, f, ensure_ascii=False, indent=2)
                return True
            except Exception:
                return False

    compare_with_baseline:
      purpose: "比較目前腳本 prompt 與 baseline，回傳差異資訊"
      input: "report_type (str)"
      output: |
        dict: {
            'has_baseline': bool,      # 是否有 baseline
            'is_identical': bool,       # 目前腳本與 baseline 是否完全一致
            'diffs': {                  # 逐 key 比較結果
                prompt_key: {
                    'baseline': str|None,
                    'current': str|None,
                    'changed': bool
                }
            }
        }
      example: |
        def compare_with_baseline(self, report_type):
            baseline = self.get_baseline(report_type)
            current = self.get_prompts(report_type)
            if not baseline:
                return {'has_baseline': False, 'is_identical': False, 'diffs': {}}
            all_keys = sorted(set(list(baseline.keys()) + list(current.keys())))
            diffs = {}
            all_same = True
            for key in all_keys:
                b_val = baseline.get(key)
                c_val = current.get(key)
                changed = b_val != c_val
                if changed:
                    all_same = False
                diffs[key] = {'baseline': b_val, 'current': c_val, 'changed': changed}
            return {'has_baseline': True, 'is_identical': all_same, 'diffs': diffs}

    restore_from_baseline:
      purpose: "從 baseline 恢復 prompt 到腳本（先備份再覆蓋）"
      input: "report_type (str)"
      output: "bool — 是否成功"
      logic: |
        1. 讀取 baseline
        2. 呼叫 update_script_prompts() 寫回腳本
        ⭐ update_script_prompts 內部會自動備份，所以這裡不需要額外備份
      example: |
        def restore_from_baseline(self, report_type):
            baseline = self.get_baseline(report_type)
            if not baseline:
                return False
            return self.update_script_prompts(report_type, baseline)

# ============================================================================
# 腳本端 Prompt 寫法規範
# ============================================================================

script_prompt_conventions:
  description: |
    為了讓 PromptManager 能正確提取和替換，腳本中的 prompt 必須遵守以下規範。

  supported_formats:
    format_1_single_var:
      description: "單一 prompt 的 stage"
      example: |
        PROMPT = """
        你是一位專業的市場分析師...
        請根據以下圖片分析...
        """
      variable_naming: "PROMPT"

    format_2_multiple_vars:
      description: "多個 prompt 的 stage（如一個 stage 有 2 次 API 呼叫）"
      example: |
        PROMPT_INFLOW = """
        請分析以下淨流入 ETF 的表現...
        """

        PROMPT_OUTFLOW = """
        請分析以下淨流出 ETF 的表現...
        """
      variable_naming: "PROMPT_{SECTION_NAME}，全大寫底線分隔"

    format_3_dict:
      description: "字典格式（較少用）"
      example: |
        PROMPTS = {
            "section_1": """
            第一段分析的 prompt...
            """,
            "section_2": """
            第二段分析的 prompt...
            """
        }

  unsupported:
    dynamic_fstring:
      description: |
        含有動態資料的 f-string prompt（如嵌入前面 stage 的輸出）
        無法被 regex 靜態提取。
      example: |
        # ❌ 舊寫法（無法提取）
        prompt = f"""
        根據以下內容：
        {stage1_output}      # ← 動態資料，無法提取
        請總結...
        """
      workaround: |
        ⭐ 推薦做法：將 f-string 轉換為模板常數 + {{variable}} 佔位符

        # ✅ 新寫法（可提取 + 可編輯）
        PROMPT_ABSTRACT = """
        根據以下內容：
        {{stage1_output}}
        請總結...
        """

        然後在 build_prompts() 中用 .replace("{{stage1_output}}", actual_data) 替換。
        這樣 PromptManager 可以正常提取和寫回，UI 也能編輯。

        對於依賴前序 API 結果的變數（如 {{us_conclusion}}），
        在 build_prompts() 中標記為 [需要前序 API 結果]，
        然後在 main() 中用實際 API 結果替換。

      migration_guide: |
        f-string → 模板常數的轉換步驟：
        1. 將 f"..." 改為 """..."""（移除 f 前綴）
        2. 將 {variable} 改為 {{variable}}
        3. 在 build_prompts() 中用 .replace() 替換變數
        4. 依賴前序 API 結果的變數，暫時標記為 [需要前序 API 結果]
        5. 在 main() 中用實際結果替換

# ============================================================================
# build_prompts() 共用函數模式（Shared Prompt Assembly）
# ============================================================================

build_prompts_pattern:
  design_principle: |
    ⭐ **核心理念**：每個 Stage 腳本提供一個 build_prompts() 函數，
    封裝完整的 prompt 組裝邏輯（變數替換 + 資料載入）。
    UI 預覽和腳本執行共用同一個函數，確保 100% 一致。

    問題背景：
    - 腳本執行：在 main() 中組裝 prompt（載入 Excel、替換變數）
    - UI 預覽：在 UI 中重新實作相同邏輯（generate_dynamic_variables()）
    - 結果：兩份組裝代碼，容易不一致 ❌

    解決方案：
    - 每個 stage 腳本新增 build_prompts(year, month, prompt_texts=None)
    - main() 呼叫 build_prompts() 取得最終 prompt
    - UI 預覽也呼叫 build_prompts()，傳入 prompt_texts（UI 編輯中的文字）
    - 單一來源原則（Single Source of Truth）✅

  function_signature:
    name: "build_prompts"
    parameters:
      year: "int — 目標年份"
      month: "int — 目標月份"
      prompt_texts: |
        Optional[dict[str, str]] — UI 傳入的編輯中 prompt 文字。
        key 為變數名（如 'PROMPT', 'PROMPT_INFLOW'），value 為文字內容。
        如果為 None 或未提供某個 key，使用 module-level 常數。
    returns: |
      list[dict] — 每個 dict 包含：
        - 'name': str — prompt 變數名（如 'PROMPT', 'PROMPT_INFLOW'）
        - 'text': str — 完整替換後的 prompt 文字（含資料、變數）

  why_prompt_texts_parameter: |
    Python 的 module-level 變數在 import 後會快取。
    當 UI 使用者編輯 prompt 並用 update_script_prompts() 寫回腳本後，
    已 import 的 module 仍持有舊值（除非 reload）。

    prompt_texts 參數解決此問題：
    - UI 直接把 session_state 中的編輯文字傳入
    - 不依賴 module reload
    - 腳本直接執行時不傳此參數，自動使用 module-level 常數

  examples:
    single_prompt_stage:
      description: "單一 prompt 的 stage（如 Stage 1, 3, 4）"
      code: |
        ```python
        PROMPT = """
        請分析 {{YEAR}}年{{MONTH}}月 的市場表現。
        {{data_comparison}}
        """

        def build_prompts(year, month, prompt_texts=None):
            # 載入資料
            excel_file = project_root / "data" / f"data_{year}{month:02d}.xlsx"
            data = load_data(excel_file) if excel_file.exists() else ""

            # 使用 UI 傳入的文字 or module-level 常數
            prompt = (prompt_texts or {}).get('PROMPT', PROMPT)

            # 替換所有變數
            final = (prompt
                .replace("{{YEAR}}", str(year))
                .replace("{{MONTH}}", str(month))
                .replace("{{data_comparison}}", data)
            )
            return [{'name': 'PROMPT', 'text': final}]

        def main(year=2025, month=12):
            prompts = build_prompts(year, month)
            result = api.generate(prompts[0]['text'], images)
        ```

    multi_prompt_stage:
      description: "多個 prompt 的 stage（如 Stage 5, 6 各有 2 個）"
      code: |
        ```python
        PROMPT_INFLOW = """分析淨流入 ETF... {{target_month}} {{data_table}}"""
        PROMPT_OUTFLOW = """分析淨流出 ETF... {{target_month}} {{data_table}}"""

        def build_prompts(year, month, prompt_texts=None):
            target_month = f"{year}年{month}月"
            excel_file = project_root / "data" / f"etf_data_{year}{month:02d}.xlsx"
            texts = prompt_texts or {}

            # 各 prompt 獨立載入對應的資料
            p_in = texts.get('PROMPT_INFLOW', PROMPT_INFLOW)
            data_in = load_data(excel_file, "淨流入前10名") if excel_file.exists() else ""
            final_in = p_in.replace("{{target_month}}", target_month)
            final_in = final_in.replace("{{data_table}}", data_in)

            p_out = texts.get('PROMPT_OUTFLOW', PROMPT_OUTFLOW)
            data_out = load_data(excel_file, "淨流出前10名") if excel_file.exists() else ""
            final_out = p_out.replace("{{target_month}}", target_month)
            final_out = final_out.replace("{{data_table}}", data_out)

            return [
                {'name': 'PROMPT_INFLOW', 'text': final_in},
                {'name': 'PROMPT_OUTFLOW', 'text': final_out},
            ]
        ```

    dependent_prompt_stage:
      description: "部分 prompt 依賴前序 API 結果的 stage（如 Stage 7）"
      code: |
        ```python
        from utils.stage_io import read_stage_output  # ⭐ 統一讀取函數

        PROMPT_US = """總結美國市場...\n{{us_full}}"""
        PROMPT_TW = """總結台灣市場...\n{{tw_full}}"""
        PROMPT_OVERALL = """整體總結...\n{{us_conclusion}}\n{{tw_conclusion}}"""

        def build_prompts(year, month, prompt_texts=None, dep_source='active'):
            texts = prompt_texts or {}
            # ⭐ 使用 read_stage_output() 統一讀取前置 stage 輸出
            # dep_source='active'（UI）→ 讀活動版本（★）
            # dep_source='temp'（workflow）→ 只讀 temp/
            stage1 = read_stage_output(1, year, month, source=dep_source)

            # Prompt 1-2: 可完整替換
            p_us = texts.get('PROMPT_US', PROMPT_US)
            final_us = p_us.replace("{{us_full}}", stage1 or "[尚未執行]")

            # Prompt 3: 依賴 API 1-2 結果，預覽時標記
            p_overall = texts.get('PROMPT_OVERALL', PROMPT_OVERALL)
            final_overall = (p_overall
                .replace("{{us_conclusion}}", "[需要前序 API 結果]")
                .replace("{{tw_conclusion}}", "[需要前序 API 結果]")
            )

            return [
                {'name': 'PROMPT_US', 'text': final_us},
                {'name': 'PROMPT_OVERALL', 'text': final_overall},
            ]

        def main(year, month):
            prompts = build_prompts(year, month)
            # API 1: 使用 prompts[0]['text']
            us_result = api.generate(prompts[0]['text'])
            # API 2: 用實際 API 結果替換 PROMPT_OVERALL 的變數
            final_overall = (PROMPT_OVERALL
                .replace("{{us_conclusion}}", us_result)
                .replace("{{tw_conclusion}}", tw_result)
            )
            overall_result = api.generate(final_overall)
        ```

  ui_integration:
    description: |
      UI 端透過 importlib 動態 import 各 stage 的 build_prompts()，
      無需在 UI 中重新實作資料載入和變數替換邏輯。
    code: |
      ```python
      def get_build_prompts_fn(stage_num):
          """動態取得 stage 腳本的 build_prompts 函數（每次強制 reload）"""
          import importlib
          import sys as _sys
          module_map = {
              1: "scripts.stages.stage1_xxx",
              2: "scripts.stages.stage2_yyy",
              # ...
          }
          if stage_num not in module_map:
              return None
          module_name = module_map[stage_num]
          # ⚠️ 必須 reload：importlib 會快取 module，
          # 若 UI 編輯腳本後不 reload，build_prompts 仍用舊邏輯
          if module_name in _sys.modules:
              mod = importlib.reload(_sys.modules[module_name])
          else:
              mod = importlib.import_module(module_name)
          return mod.build_prompts

      # 完整預覽按鈕 handler
      if st.button("🔄 生成完整預覽"):
          build_fn = get_build_prompts_fn(stage_num)
          # 傳入 UI 編輯中的 prompt 文字
          edited = {pn: st.session_state.get(f"pe_{stage_num}_{pn}", v)
                    for pn, v in base_prompts.items()}
          results = build_fn(year, month, prompt_texts=edited)
          # 顯示對應 prompt 的完整預覽
          for r in results:
              if r['name'] == current_prompt_name:
                  st.text_area("完整預覽", r['text'], disabled=True)
      ```

  benefits:
    - "✅ 預覽與執行 100% 一致：使用完全相同的組裝函數"
    - "✅ 單一維護點：修改組裝邏輯只需改 build_prompts()"
    - "✅ 解決 module 快取問題：prompt_texts 參數繞過 import 快取"
    - "✅ 支援所有 prompt 類型：靜態、動態變數、依賴前序 API 結果"
    - "✅ UI 無需知道資料載入細節：交給 stage 腳本處理"

  migration_guide:
    description: "將現有 stage 腳本遷移到 build_prompts() 模式"
    steps:
      - step: "1. 確保 prompt 是 module-level 常數（不是 f-string）"
        detail: "如果有 f-string，先用 unsupported.dynamic_fstring.migration_guide 轉換"
      - step: "2. 新增 build_prompts() 函數"
        detail: |
          將 main() 中的資料載入 + 變數替換邏輯提取到 build_prompts()。
          保持 main() 中的圖片載入和 API 呼叫不動。
      - step: "3. 修改 main() 呼叫 build_prompts()"
        detail: |
          prompts = build_prompts(year, month)
          result = api.generate(prompts[0]['text'], images)
      - step: "4. 刪除 UI 中的重複邏輯"
        detail: |
          刪除 generate_dynamic_variables() 等 UI 專用的組裝函數，
          改為呼叫 get_build_prompts_fn(stage_num)(year, month, prompt_texts=edited)
      - step: "5. 測試"
        detail: "確認 UI 完整預覽與腳本執行的 prompt 內容一致"

# ============================================================================
# Stage 間依賴的統一讀取機制（Unified Stage Output Reading）
# ============================================================================

stage_output_reading:
  design_principle: |
    ⭐ **核心理念**：當 Stage 間存在依賴關係（如 Stage 4 讀取 Stage 3 輸出），
    所有觸發路徑（UI 預覽、UI 執行、CLI 執行、一鍵 workflow）
    必須使用同一個函數讀取同一個資料來源。

    問題背景：
    - UI 預覽在 build_prompts() 中直接讀取 temp/ 檔案
    - UI「文字輸入（前置 Stage 輸出）」顯示活動版本（★）的內容
    - 兩者可能是不同檔案，導致預覽與 UI 顯示不一致 ❌
    - 一鍵 workflow 若優先讀取舊的活動版本，會忽略剛生成的 temp/ 檔案 ❌

    解決方案：
    - 建立 utils/stage_io.py，提供 read_stage_output(source) 單一讀取函數
    - 所有 build_prompts(dep_source) 內部統一呼叫此函數
    - source='active'（UI）：活動版本（★）優先，回退 temp/
    - source='temp'（workflow）：只讀 temp/，忽略活動版本
    - 透過 dep_source 參數鏈明確傳遞呼叫者意圖 ✅

  module:
    file: "utils/stage_io.py"
    description: "Stage 輸出讀取工具 — 統一讀取邏輯"

  function:
    name: "read_stage_output"
    signature: "read_stage_output(stage_num: int, year: int, month: int, source: str = 'active') -> str"
    parameters:
      stage_num: "Stage 編號（1-7）"
      year: "年份"
      month: "月份"
      source: |
        讀取模式：
        - 'active'（預設）：活動版本（★）優先，無則回退 temp/
          → UI 預覽、UI 執行、CLI 使用，尊重使用者選定的版本
        - 'temp'：只讀 temp/ 檔案，忽略活動版本
          → 一鍵 workflow 使用，確保讀到剛生成的結果
    returns: "Stage 輸出內容（str），若不存在回傳空字串"

  resolution_logic: |
    判斷邏輯（依 source 參數分派）：

    **source='active'（預設，UI 預覽/執行/CLI）：**
    | 活動版本（★）     | temp/ 檔案         | 結果           |
    |--------------------|--------------------|----------------|
    | 存在               | 存在               | 用活動版本     |
    | 存在               | 不存在              | 用活動版本     |
    | 不存在              | 存在               | 用 temp/       |
    | 不存在              | 不存在              | 回傳空字串     |

    **source='temp'（一鍵 workflow）：**
    | temp/ 檔案         | 結果           |
    |--------------------|----------------|
    | 存在               | 用 temp/       |
    | 不存在              | 回傳空字串     |

    活動版本路徑：temp/active_versions_{YYYYMM}.json → temp/versions/{YYYYMM}/stage{N}/{vid}.md
    temp/ 檔案路徑：temp/{output_prefix}_{YYYYMM}.md

  dep_source_chain: |
    依賴讀取的參數傳遞鏈：
    main(dep_source='active') → build_prompts(dep_source=dep_source) → read_stage_output(source=dep_source)

    - UI 預覽：直接呼叫 build_prompts()，dep_source 預設 'active' → 讀活動版本
    - UI 執行：subprocess 呼叫 main()，dep_source 預設 'active' → 讀活動版本
    - 一鍵 workflow：直接呼叫 main(dep_source='temp') → 只讀 temp/

  usage_scenarios:
    workflow: |
      一鍵 workflow：呼叫 main(dep_source='temp')，明確指定只讀 temp/，
      確保每個 Stage 讀到前面 Stage 剛生成的結果，不受舊的活動版本干擾。
    ui_preview: |
      UI 預覽：呼叫 build_prompts()，dep_source 預設 'active'，
      尊重使用者用 ★ 選定的活動版本。
    ui_execution: |
      UI 執行：透過 subprocess 呼叫 main()，dep_source 預設 'active'，
      與預覽行為一致，讀取使用者選定的活動版本。

  implementation:
    code: |
      ```python
      # utils/stage_io.py
      import json
      from pathlib import Path

      project_root = Path(__file__).parent.parent

      STAGE_OUTPUT_PREFIX = {
          1: "stage1_xxx",
          2: "stage2_yyy",
          3: "stage3_zzz",
          # ... 依專案定義
      }

      def _get_active_version_path(stage_num, prefix):
          """取得活動版本檔案路徑"""
          active_path = project_root / "temp" / f"active_versions_{prefix}.json"
          if not active_path.exists():
              return None
          try:
              active = json.loads(active_path.read_text(encoding='utf-8'))
              vid = active.get(str(stage_num))
              if vid:
                  vf = project_root / "temp" / "versions" / prefix / f"stage{stage_num}" / f"{vid}.md"
                  if vf.exists():
                      return vf
          except Exception:
              pass
          return None

      def _get_temp_path(stage_num, prefix):
          """取得 temp/ 檔案路徑"""
          output_prefix = STAGE_OUTPUT_PREFIX.get(stage_num)
          if not output_prefix:
              return None
          temp_file = project_root / "temp" / f"{output_prefix}_{prefix}.md"
          if temp_file.exists():
              return temp_file
          return None

      def read_stage_output(stage_num, year, month, source='active'):
          """
          讀取指定 Stage 的輸出。
          source='active'：活動版本（★）優先，回退 temp/（UI 用）
          source='temp'：只讀 temp/（一鍵 workflow 用）
          """
          prefix = f"{year}{month:02d}"

          if source == 'temp':
              # Workflow 模式：只讀 temp/，確保讀到剛生成的結果
              temp_path = _get_temp_path(stage_num, prefix)
              if temp_path:
                  return temp_path.read_text(encoding='utf-8')
              return ""

          # Active 模式（預設）：活動版本優先，尊重使用者選定的版本
          version_path = _get_active_version_path(stage_num, prefix)
          if version_path:
              return version_path.read_text(encoding='utf-8')

          # 無活動版本 → 回退 temp/
          temp_path = _get_temp_path(stage_num, prefix)
          if temp_path:
              return temp_path.read_text(encoding='utf-8')
          return ""
      ```

  benefits:
    - "✅ UI 尊重使用者意圖：預覽和執行都讀取使用者用 ★ 選定的活動版本"
    - "✅ Workflow 不受舊版本干擾：source='temp' 確保只讀剛生成的結果"
    - "✅ 向後相容：沒有活動版本時自動回退到 temp/ 檔案"
    - "✅ 語意清晰：source 參數明確表達呼叫者意圖，不依賴隱式的時間戳比較"
    - "✅ 單一維護點：修改讀取邏輯只需改 stage_io.py"

  migration_guide:
    steps:
      - step: "1. 建立 utils/stage_io.py"
        detail: "定義 STAGE_OUTPUT_PREFIX 對應表和 read_stage_output() 函數"
      - step: "2. 在有依賴的 stage 中 import 並使用"
        detail: |
          from utils.stage_io import read_stage_output
          stage3_output = read_stage_output(3, year, month, source=dep_source)
      - step: "3. 為 build_prompts() 和 main() 加入 dep_source 參數"
        detail: |
          def build_prompts(year, month, prompt_texts=None, dep_source='active'):
              stage3 = read_stage_output(3, year, month, source=dep_source)
              ...
          def main(year, month, dep_source='active'):
              prompts = build_prompts(year, month, dep_source=dep_source)
              ...
      - step: "4. 在一鍵 workflow 中傳入 dep_source='temp'"
        detail: |
          只有 run_complete_workflow.py 明確傳入 dep_source='temp'：
          stage4_main(year, month, dep_source='temp')
          所有其他呼叫端（UI、CLI）使用預設 'active'。
      - step: "5. 移除各 stage 自己的 load_xxx_output() 函數"
        detail: "刪除 stage 腳本中各自實作的讀取邏輯，統一走 read_stage_output()"
      - step: "6. 移除 UI 中的 dep_outputs / apply_dep_versions 等間接傳遞機制"
        detail: |
          不再需要 UI 從外部傳入依賴資料，
          build_prompts() 內部直接呼叫 read_stage_output()。
      - step: "7. 測試各觸發路徑"
        detail: |
          確認以下場景行為正確：
          - UI 預覽 → build_prompts() → source='active' → 讀活動版本
          - UI 執行 → subprocess → main() → source='active' → 讀活動版本
          - CLI 執行 → main() → source='active' → 讀活動版本
          - 一鍵 workflow → main(dep_source='temp') → source='temp' → 只讀 temp/

# ============================================================================
# 輸入驗證（Input Validation / Pre-flight Check）
# ============================================================================

input_validation:
  design_principle: |
    ⭐ **核心理念**：每個 Stage 腳本提供一個 check_inputs() 函數，
    在執行前檢查所有必要輸入（圖片、Excel、前置 Stage 輸出）是否存在。
    Workflow 在啟動每個 Stage 前呼叫此函數，提前警告缺少的輸入。

    問題背景：
    - Stage 腳本在執行中途才發現輸入不存在，浪費 API 呼叫和時間
    - 缺少上月數據時，Stage 直接失敗，沒有提前警告
    - 不同 Stage 的錯誤處理不一致

    解決方案：
    - 每個 Stage 腳本新增 check_inputs(year, month) 函數
    - 區分 ERROR（必要輸入，缺少會導致失敗）和 WARNING（可選輸入）
    - Workflow 在每個 Stage 前統一呼叫檢查
    - 個別執行 Stage 時也在 main() 開頭呼叫

  function_signature:
    name: "check_inputs"
    parameters:
      year: "int — 目標年份"
      month: "int — 目標月份"
    returns: |
      list[tuple[str, str]] — [(level, message), ...]
        level: 'ERROR'（必要輸入，缺少會導致失敗）
               'WARNING'（可選輸入，缺少不影響執行）

  input_categories:
    images:
      description: "圖片檔案（PNG 等），通常是 multimodal API 的必要輸入"
      typical_level: "ERROR"
      example: |
        img = project_root / "images" / f"chart_{prefix}.png"
        if not img.exists():
            issues.append(("ERROR", f"圖片不存在: {img.name}"))

    excel_data:
      description: "Excel 資料檔案"
      typical_level: "WARNING 或 ERROR，視是否有備用資料來源（如圖片）"
      example: |
        excel = project_root / "data" / f"data_{prefix}.xlsx"
        if not excel.exists():
            issues.append(("WARNING", f"Excel 不存在: {excel.name}"))

    stage_outputs:
      description: "前置 Stage 的輸出檔案（.md）"
      typical_level: "當月必要輸出 → ERROR；上月對比用 → WARNING"
      example: |
        curr = project_root / "temp" / f"stage3_output_{prefix}.md"
        if not curr.exists():
            issues.append(("ERROR", f"Stage 3 當月輸出不存在: {curr.name}"))

        prev = project_root / "temp" / f"stage3_output_{prev_prefix}.md"
        if not prev.exists():
            issues.append(("WARNING", f"Stage 3 上月輸出不存在: {prev.name}（MoM 對比將缺少上月資料）"))

  examples:
    simple_stage:
      description: "只需要一張圖片的 Stage"
      code: |
        ```python
        def check_inputs(year, month):
            """檢查所有輸入是否存在，回傳 [(level, message), ...]"""
            issues = []
            prefix = f"{year}{month:02d}"

            img = project_root / "images" / f"us_etf_top10_flows_{prefix}.png"
            if not img.exists():
                issues.append(("ERROR", f"圖片不存在: {img.name}"))

            return issues
        ```

    multi_input_stage:
      description: "需要多種輸入的 Stage（圖片 + Excel + 上月對比）"
      code: |
        ```python
        def check_inputs(year, month):
            issues = []
            prefix = f"{year}{month:02d}"
            prev_month = month - 1 if month > 1 else 12
            prev_year = year if month > 1 else year - 1
            prev_prefix = f"{prev_year}{prev_month:02d}"

            # 圖片（必要）
            for p in [f"chart_{prefix}.png", f"chart_{prev_prefix}.png"]:
                if not (project_root / "images" / p).exists():
                    issues.append(("ERROR", f"圖片不存在: {p}"))

            # Excel（有備用資料來源，為 WARNING）
            excel = project_root / "data" / "data.xlsx"
            if not excel.exists():
                issues.append(("WARNING", f"Excel 不存在: {excel.name}"))

            return issues
        ```

    dependent_stage:
      description: "依賴前置 Stage 輸出的 Stage（如 MoM 對比）"
      code: |
        ```python
        def check_inputs(year, month):
            issues = []
            prefix = f"{year}{month:02d}"
            prev_month = month - 1 if month > 1 else 12
            prev_year = year if month > 1 else year - 1
            prev_prefix = f"{prev_year}{prev_month:02d}"

            # 當月 Stage 3 輸出（必要）
            curr = project_root / "temp" / f"stage3_output_{prefix}.md"
            if not curr.exists():
                issues.append(("ERROR", f"Stage 3 當月輸出不存在: {curr.name}"))

            # 上月 Stage 3 輸出（MoM 對比用，非必要）
            prev = project_root / "temp" / f"stage3_output_{prev_prefix}.md"
            if not prev.exists():
                issues.append(("WARNING",
                    f"Stage 3 上月輸出不存在: {prev.name}（MoM 對比將缺少上月資料）"))

            return issues
        ```

    summary_stage:
      description: "彙整多個前置 Stage 輸出的 Stage（如最終總結）"
      code: |
        ```python
        def check_inputs(year, month):
            issues = []
            prefix = f"{year}{month:02d}"
            temp_dir = project_root / "temp"

            # 必要輸出（缺少會嚴重影響品質）
            required = {
                1: f"stage1_output_{prefix}.md",
                4: f"stage4_output_{prefix}.md",
            }
            for sn, fname in required.items():
                if not (temp_dir / fname).exists():
                    issues.append(("ERROR", f"Stage {sn} 輸出不存在: {fname}"))

            # 可選輸出（缺少會影響完整性但不致失敗）
            optional = {
                2: f"stage2_output_{prefix}.md",
                3: f"stage3_output_{prefix}.md",
                5: f"stage5_output_{prefix}.md",
                6: f"stage6_output_{prefix}.md",
            }
            for sn, fname in optional.items():
                if not (temp_dir / fname).exists():
                    issues.append(("WARNING", f"Stage {sn} 輸出不存在: {fname}"))

            return issues
        ```

  workflow_integration:
    description: |
      Workflow 腳本在啟動每個 Stage 前呼叫 check_inputs()，統一印出檢查結果。
    helper_function: |
      ```python
      def run_input_check(check_fn, year, month, logger=None):
          """執行輸入檢查並印出結果，回傳是否有 ERROR"""
          issues = check_fn(year, month)
          if not issues:
              print("[CHECK] 所有輸入就緒")
              return False
          for level, msg in issues:
              print(f"  [{level}] {msg}")
          has_error = any(level == "ERROR" for level, _ in issues)
          if logger and issues:
              logger.info(f"Input check: {len(issues)} issue(s), has_error={has_error}")
          return has_error
      ```
    usage: |
      ```python
      from scripts.stages.stage1_xxx import check_inputs as stage1_check
      from scripts.stages.stage2_yyy import check_inputs as stage2_check
      # ... 以此類推

      # 在每個 Stage 執行前
      print("[Stage 1] 輸入檢查...")
      run_input_check(stage1_check, year, month, logger)
      # 繼續執行（stages 內部已有各自的錯誤處理）
      ```

  stage_integration:
    description: |
      每個 Stage 的 main() 在開頭呼叫 check_inputs() 並印出警告，
      但不中斷執行（讓後續程式碼自行處理缺失）。
    code: |
      ```python
      def main(year=2025, month=12):
          print(f"[Stage N] XXX ({year}年{month}月)")
          print("-" * 60)

          for level, msg in check_inputs(year, month):
              print(f"  [{level}] {msg}")

          # ... 後續邏輯（stage 內部已有 if not exists 的處理）
      ```

  auto_run_dependencies:
    description: |
      對於依賴前置 Stage 輸出的 Stage，Workflow 可自動補跑缺失的依賴。
      常見場景：某個 Stage 需要上個月的前置 Stage 輸出做 MoM 對比，
      但使用者只跑了當月流程，上個月的輸出不存在。
    code: |
      ```python
      # 在 Stage N 之前，檢查並自動補跑上月依賴
      from datetime import datetime, timedelta

      prev_date = datetime(year, month, 1) - timedelta(days=1)
      prev_year, prev_month = prev_date.year, prev_date.month
      prev_output = work_dir / "temp" / f"stage3_output_{prev_year}{prev_month:02d}.md"

      if not prev_output.exists():
          print(f"[AUTO] 上月 Stage 3 輸出不存在，自動補跑...")
          stage3_main(prev_year, prev_month)
      ```

  benefits:
    - "✅ 提前警告：在 API 呼叫前就發現缺失輸入"
    - "✅ 區分嚴重程度：ERROR vs WARNING 讓使用者了解影響範圍"
    - "✅ 一致的介面：所有 Stage 使用相同的 check_inputs(year, month) 簽名"
    - "✅ 雙重整合：Workflow 統一檢查 + 個別 Stage 各自檢查"
    - "✅ 不阻斷執行：檢查結果僅為警告，stage 內部自行決定是否中斷"
    - "✅ 可擴展：新增輸入類型只需修改對應 stage 的 check_inputs()"

  best_practices:
    - "每個 Stage 都應有 check_inputs()，即使只有一個輸入"
    - "ERROR 用於必要輸入（缺少會導致 API 失敗或結果品質極差）"
    - "WARNING 用於可選輸入（缺少會影響完整性但不致失敗）"
    - "Workflow 的 run_input_check() 不應阻止 Stage 執行"
    - "check_inputs() 應快速執行（只檢查檔案存在性，不讀取內容）"
    - "上月對比用的數據通常為 WARNING，當月必要數據為 ERROR"
    - "前置 Stage 輸出中，核心段落用 ERROR，補充段落用 WARNING"

  workflow_result_reporting:
    description: |
      Workflow 執行完成後，將每個 Stage 的成功/失敗狀態寫入 JSON 摘要檔，
      供 UI 讀取並以視覺化方式呈現。解決「Workflow 靜默失敗」的問題：
      即使中間 Stage 失敗但流程繼續，使用者也能在 UI 一目了然地看到哪些 Stage 失敗了。

    problem: |
      常見的 Workflow 錯誤處理模式是「中間 Stage 失敗 → 印 WARNING → 繼續執行」，
      這導致：
      1. UI 只看 process return code（0=成功），即使多個 Stage 失敗也顯示「✅ 完成」
      2. 失敗訊息藏在滾動的 console log 中，很容易漏看
      3. 使用者不知道最終產出的品質（哪些段落是正常生成的、哪些是缺失的）

    solution: |
      Workflow 在所有退出路徑寫出結構化的結果 JSON，UI 讀取後顯示摘要表格。

    result_json:
      path: "temp/workflow_result_{YYYYMM}.json"
      format: |
        ```json
        {
          "stages": {
            "Stage 0": true,
            "Stage 1": true,
            "Stage 2": false,
            "Stage 3": true,
            ...
          },
          "timestamp": "2026-02-24 15:30:00",
          "success": false,
          "success_count": 7,
          "total_count": 9
        }
        ```

    workflow_side:
      description: |
        在 Workflow 腳本中新增 write_workflow_result() 函式，
        並在所有退出路徑（正常完成、Stage 7 失敗中斷、Stage 8 失敗中斷）呼叫。
      code: |
        ```python
        import json

        def write_workflow_result(data_prefix, stages_status, work_dir):
            """寫出 workflow 結果摘要 JSON，供 UI 讀取"""
            result = {
                "stages": stages_status,
                "timestamp": time.strftime('%Y-%m-%d %H:%M:%S'),
                "success": all(stages_status.values()),
                "success_count": sum(1 for v in stages_status.values() if v),
                "total_count": len(stages_status),
            }
            result_file = work_dir / "temp" / f"workflow_result_{data_prefix}.json"
            result_file.parent.mkdir(exist_ok=True)
            with open(result_file, 'w', encoding='utf-8') as f:
                json.dump(result, f, ensure_ascii=False, indent=2)
        ```
      exit_paths:
        - "正常完成（所有 Stage 跑完）→ 在 logger.finalize() 前寫入"
        - "關鍵 Stage 失敗中斷（如 Stage 7/8）→ return False 前寫入，未執行的 Stage 標記為 False"
      important: |
        所有退出路徑都必須寫入 JSON，包括提前中斷的情況。
        未執行的 Stage 應標記為 False，讓 UI 能正確顯示。

    ui_side:
      description: |
        UI 在 Workflow 執行完成後（不論 return code），讀取結果 JSON 並顯示摘要。
      code: |
        ```python
        def show_workflow_result(prefix):
            """讀取並顯示 workflow 結果摘要"""
            result_file = Path("temp") / f"workflow_result_{prefix}.json"
            if not result_file.exists():
                return
            import json
            data = json.loads(result_file.read_text(encoding='utf-8'))
            stages = data.get("stages", {})
            failed = [k for k, v in stages.items() if not v]

            if failed:
                st.warning(f"**Workflow 結果：{data['success_count']}/{data['total_count']} 個 Stage 成功**")
            else:
                st.success(f"**Workflow 結果：全部 {data['total_count']} 個 Stage 成功**")

            cols = st.columns(3)
            for i, (stage, success) in enumerate(stages.items()):
                with cols[i % 3]:
                    if success:
                        st.markdown(f":green[✅ {stage}] {name}")
                    else:
                        st.markdown(f":red[❌ {stage}] {name}")
        ```
      placement: |
        在 run_cmd() 呼叫之後、版本快照之前呼叫 show_workflow_result()。
        不論 run_cmd() 回傳 True 或 False 都要呼叫（因為失敗時更需要看到摘要）。
        ```python
        ok = run_cmd(f"python run_complete_workflow.py {year} {month}", "完整 Workflow")
        show_workflow_result(prefix)  # ← 不論成功失敗都顯示
        if ok:
            # 版本快照...
        ```

    benefits:
      - "✅ 失敗可見：即使 return code 為 0，也能看到哪些 Stage 失敗"
      - "✅ 結構化：JSON 格式方便 UI 解析，不依賴 console log 文字解析"
      - "✅ 持久化：結果寫入檔案，關閉 UI 後重新開啟仍可查看"
      - "✅ 全退出路徑覆蓋：正常完成和提前中斷都有摘要"

# ============================================================================
# UI 整合設計（Streamlit）
# ============================================================================

ui_integration:
  stage_config:
    description: |
      UI 用一個 STAGE_META 字典描述所有 stage 的配置，
      用於自動生成各 stage 的管理頁面。
    schema:
      name: "str — stage 顯示名稱"
      emoji: "str — 圖示"
      api: "int — API 呼叫次數"
      script: "str | None — 腳本路徑"
      output_prefix: "str | None — 輸出檔名前綴"
      images_in: "list[str] — 輸入圖片檔名（支援 {prefix} 替換）"
      data_in: "list[str] — 輸入資料檔名（支援 {prefix} 替換）"
      prompt_key: "str | None — 對應 PromptManager.prompt_files 的 key"

  prompt_editor_ui:
    layout: |
      每個 stage 頁面有三個 tab：
      1. 📥 輸入管理 — 圖片預覽、資料狀態、Prompt 編輯器
      2. ▶️ 執行 — 執行按鈕 + 當前輸出預覽 + 腳本原始碼
      3. 📜 版本記錄 — 輸出版本快照管理

    prompt_section_components:
      - name: "草稿記錄 expander（含 Baseline）"
        description: |
          列出已存的草稿，Baseline 固定在最上方。
          - Baseline：置頂顯示，有「載入」按鈕，無刪除按鈕（不可刪除）
          - 草稿：依時間排序，有「載入」和「🗑」刪除按鈕
          - Baseline 與草稿之間用分隔線區分

      - name: "Baseline 比較 expander"
        description: |
          顯示目前腳本 prompt 與 Baseline 的差異：
          - 有 Baseline 時：顯示「✅ 與 Baseline 一致」或「⚠️ 與 Baseline 不同」
          - 有差異時：左右並排顯示 Baseline vs 目前腳本（disabled text_area）
          - 操作按鈕：
            - 📌 將目前腳本設為新 Baseline（覆蓋現有）
            - ⏪ 從 Baseline 還原腳本（只在有差異時顯示）
          - 無 Baseline 時：顯示「📌 Baseline（尚未建立）」+ 建立按鈕

      - name: "各 Prompt 編輯器"
        description: |
          每個 prompt 變數一個 expander，內含：
          - 字數/行數顯示
          - 是否已修改的提示
          - text_area 編輯器（可編輯）
      - name: "Prompt 預覽功能（兩種層次）"
        description: |
          ⭐ 提供兩層次的預覽：

          【輕量靜態預覽】render_prompt_with_variables()
          - 僅替換靜態變數（{{YEAR}}, {{MONTH}} 等）
          - 動態變數（需讀取 Excel/檔案）標記為 [執行時動態生成: {{xxx}}]
          - 即時回饋，不需要讀取任何檔案
          - 顯示替換後的字數和行數

          【完整預覽】呼叫 build_prompts()（⭐ 推薦）
          - 呼叫 stage 腳本的 build_prompts(year, month, prompt_texts=edited)
          - 完整替換所有變數（含 Excel 資料）
          - 預覽內容與實際執行完全一致
          - 需要資料檔案存在

        static_preview_implementation: |
          def render_prompt_with_variables(prompt_text, year, month):
              """輕量靜態預覽：僅替換已知的靜態變數"""
              prev_year, prev_month = calculate_prev_month(year, month)
              rendered = (prompt_text
                  .replace("{{YEAR}}", str(year))
                  .replace("{{MONTH}}", str(month))
                  .replace("{{PREV_YEAR}}", str(prev_year))
                  .replace("{{PREV_MONTH}}", str(prev_month))
              )
              # 剩餘動態變數標記
              import re
              rendered = re.sub(r'\{\{(\w+)\}\}',
                                lambda m: f"[執行時動態生成: {{{{{m.group(1)}}}}}]",
                                rendered)
              return rendered

        complete_preview_implementation: |
          def get_build_prompts_fn(stage_num):
              """動態取得 stage 腳本的 build_prompts()"""
              import importlib
              module_map = {1: "scripts.stages.stage1_xxx", ...}
              mod = importlib.import_module(module_map[stage_num])
              return mod.build_prompts

          # 完整預覽按鈕
          if st.button("🔄 生成完整預覽（含資料）"):
              build_fn = get_build_prompts_fn(stage_num)
              edited = {pn: st.session_state.get(f"pe_{stage_num}_{pn}", v)
                        for pn, v in base_prompts.items()}
              results = build_fn(year, month, prompt_texts=edited)
              for r in results:
                  st.text_area(f"完整預覽：{r['name']}", r['text'],
                               height=300, disabled=True)

        note: |
          ⚠️ 不要在 UI 中重新實作 build_prompts() 的資料載入邏輯。
          直接 import 並呼叫 stage 腳本的 build_prompts()，
          確保預覽與執行使用完全相同的程式碼路徑。

      - name: "操作按鈕列（3 欄）"
        buttons:
          - "💾 暫存草稿 — 存到 prompts/drafts/ JSON，不影響執行"
          - "📤 更新到腳本 — 呼叫 update_script_prompts()，寫回 .py"
          - "🔄 從腳本重新載入 — 清除 session_state，重新讀取"

    session_state_keys:
      prompt_editor: "pe_{stage_num}_{prompt_var_name}"

  streamlit_code_patterns:
    prompt_editor: |
      def ui_prompts(stage_num, year=None, month=None):
          meta = STAGE_META[stage_num]
          if not meta["prompt_key"]:
              return

          pm = PromptManager()
          base_prompts = pm.get_prompts(meta["prompt_key"])
          if not base_prompts:
              st.warning("找不到 Prompt")
              return

          # ===== 草稿管理（含 Baseline 置頂）=====
          baseline_prompts = pm.get_baseline(meta["prompt_key"])
          drafts = get_drafts(stage_num)
          has_entries = bool(baseline_prompts or drafts)

          if has_entries:
              draft_label = f"📁 草稿記錄（{len(drafts)} 個）" if drafts else "📁 草稿記錄"
              with st.expander(draft_label, expanded=False):
                  # Baseline 固定在最上方
                  if baseline_prompts:
                      c1, c2, c3 = st.columns([5, 1, 1])
                      with c1:
                          st.text("📌 Baseline（基準版本）")
                      with c2:
                          if st.button("載入", key=f"ld_{stage_num}_baseline",
                                       use_container_width=True):
                              for pn, content in baseline_prompts.items():
                                  st.session_state[f"pe_{stage_num}_{pn}"] = content
                              st.rerun()
                      with c3:
                          st.empty()  # Baseline 不可刪除
                      if drafts:
                          st.divider()

                  # 草稿列表（載入 + 刪除按鈕）
                  for d in drafts[:10]:
                      c1, c2, c3 = st.columns([5, 1, 1])
                      with c1:
                          st.text(f"{d['id']}  ({d['time'].strftime('%m-%d %H:%M:%S')})")
                      with c2:
                          if st.button("載入", key=f"ld_{stage_num}_{d['id']}",
                                       use_container_width=True):
                              loaded = json.loads(
                                  Path(d["path"]).read_text(encoding='utf-8'))
                              for pn, content in loaded.items():
                                  st.session_state[f"pe_{stage_num}_{pn}"] = content
                              st.rerun()
                      with c3:
                          if st.button("🗑", key=f"del_{stage_num}_{d['id']}",
                                       use_container_width=True):
                              Path(d["path"]).unlink()
                              st.rerun()

          # ===== 各 Prompt 編輯器 =====
          for pname, default in base_prompts.items():
              init = st.session_state.get(f"pe_{stage_num}_{pname}", default)
              with st.expander(f"✏️ {pname}"):
                  cc = st.columns(3)
                  cc[0].caption(f"字數：{len(init)}")
                  cc[1].caption(f"行數：{len(init.splitlines())}")
                  if init != default:
                      cc[2].caption("⚠️ 已修改")

                  st.text_area("", init, height=250,
                               key=f"pe_{stage_num}_{pname}",
                               label_visibility="collapsed")

                  if year and month:
                      with st.expander(f"👁️ 預覽（變數替換後）", expanded=False):
                          rendered = render_prompt_with_variables(init, year, month)
                          st.text_area("", rendered, height=250,
                                       key=f"preview_{stage_num}_{pname}",
                                       label_visibility="collapsed",
                                       disabled=True)
                          st.caption(f"📊 替換後字數：{len(rendered)} | 行數：{len(rendered.splitlines())}")

          # ===== Baseline 比較 =====
          comparison = pm.compare_with_baseline(meta["prompt_key"])
          if comparison['has_baseline']:
              status_label = "與 Baseline 一致" if comparison['is_identical'] else "與 Baseline 不同"
              status_icon = "✅" if comparison['is_identical'] else "⚠️"
              with st.expander(f"{status_icon} Baseline 比較（{status_label}）", expanded=False):
                  if comparison['is_identical']:
                      st.success("目前腳本的 Prompt 與 Baseline 完全一致。")
                  else:
                      for pname, diff in comparison['diffs'].items():
                          if diff['changed']:
                              st.markdown(f"**`{pname}`** — 有差異")
                              bl_col, cur_col = st.columns(2)
                              with bl_col:
                                  st.caption("Baseline")
                                  if diff['baseline']:
                                      st.text_area("", diff['baseline'], height=200,
                                                   key=f"bl_{stage_num}_{pname}",
                                                   disabled=True,
                                                   label_visibility="collapsed")
                                  else:
                                      st.info("（Baseline 中不存在此 key）")
                              with cur_col:
                                  st.caption("目前腳本")
                                  if diff['current']:
                                      st.text_area("", diff['current'], height=200,
                                                   key=f"cur_{stage_num}_{pname}",
                                                   disabled=True,
                                                   label_visibility="collapsed")
                                  else:
                                      st.info("（腳本中不存在此 key）")
                              st.divider()
                          else:
                              st.caption(f"`{pname}` — 無差異")

                  bl_c1, bl_c2 = st.columns(2)
                  with bl_c1:
                      if st.button("📌 將目前腳本設為新 Baseline",
                                   key=f"set_bl_{stage_num}",
                                   use_container_width=True):
                          if pm.save_baseline(meta["prompt_key"]):
                              st.success("✅ Baseline 已更新")
                              st.rerun()
                  with bl_c2:
                      if not comparison['is_identical']:
                          if st.button("⏪ 從 Baseline 還原腳本",
                                       key=f"restore_bl_{stage_num}",
                                       use_container_width=True):
                              if pm.restore_from_baseline(meta["prompt_key"]):
                                  st.success("✅ 已還原為 Baseline")
                                  for pn in base_prompts:
                                      st.session_state.pop(f"pe_{stage_num}_{pn}", None)
                                  st.rerun()
          else:
              with st.expander("📌 Baseline（尚未建立）", expanded=False):
                  if st.button("📌 將目前腳本設為 Baseline",
                               key=f"init_bl_{stage_num}",
                               use_container_width=True):
                      if pm.save_baseline(meta["prompt_key"]):
                          st.success("✅ Baseline 已建立")
                          st.rerun()

          # ===== 三個按鈕 =====
          c1, c2, c3 = st.columns(3)
          # 暫存草稿 → save_draft()
          # 更新到腳本 → pm.update_script_prompts()
          # 重新載入 → 清 session_state + st.rerun()

# ============================================================================
# 輸出版本管理
# ============================================================================

version_management:
  description: |
    每次成功執行 stage 後，自動快照輸出到版本目錄。
    使用者可以切換主要版本、刪除版本、預覽內容。
    最終組裝時可選擇各 stage 的特定版本。

  storage:
    snapshots: "temp/versions/{YYYYMM}/stage{N}/v{YYYYMMDD_HHMMSS}[_{tag}].md"
    snapshot_patterns:
      individual_run: "v20260211_143022.md"          # 個別執行 stage
      workflow_run: "v20260211_143022_workflow.md"   # 完整 workflow 執行
    active_tracking: "temp/active_versions_{YYYYMM}.json"
    active_json_format: |
      {
        "1": "v20260209_143022",
        "2": "v20260209_143045_workflow",
        ...
      }

  operations:
    snapshot:
      signature: "snapshot(stage_num, prefix, tag=None)"
      description: "複製 temp/stage{N}_output_{prefix}.md → versions 目錄"
      tag_parameter: |
        可選的 tag 參數用於區分產出來源：
        - tag=None（預設）：個別執行 stage → v{timestamp}.md
        - tag="workflow"：完整 workflow 執行 → v{timestamp}_workflow.md
        這樣使用者可以一眼區分哪些版本是單獨執行產生，哪些是完整流程產生
    set_active: "更新 active_versions JSON"
    apply_version: "從 versions 目錄複製回 temp/（供下游 stage 讀取）"
    delete_version: "刪除快照檔 + 若為 active 則清除 active 記錄"

  auto_snapshot_flow:
    individual_stage: |
      執行單一 stage → 成功 → snapshot(stage_num, prefix) → set_active_vid()
      產生檔名：v20260211_143022.md

    complete_workflow: |
      執行完整 workflow → 成功 → 對所有 stage 批次執行：
        for sn in range(1, 8):
          snapshot(sn, prefix, tag="workflow")
          set_active_vid(sn, prefix, vid)
      產生檔名：v20260211_143022_workflow.md（所有 stage 使用相同時間戳）

    benefit: |
      兩種執行模式產生不同的檔名格式，使用者可輕易區分：
      - 無後綴版本：單獨測試/調整某個 stage
      - _workflow 版本：完整流程一次跑完，確保各 stage 間的一致性

  assembly_stage:
    description: |
      最終組裝 stage 的特殊 UI：
      - 為每個前置 stage 提供 selectbox 選擇版本
      - 「套用」按鈕：apply_version() 將選定版本複製到 temp/
      - 然後執行組裝腳本讀取 temp/ 中的檔案

# ============================================================================
# 已知陷阱與解決方案
# ============================================================================

known_pitfalls:
  - issue: "提取和寫回 regex 不一致"
    description: |
      extract_prompts_from_script 和 update_script_prompts 的偵測 regex 必須一致。
      例如 extract 支援 PROMPT（無底線），但 update 的偵測只找 PROMPT_\w+，
      會導致「看得到但寫不回」的假成功 bug。
    solution: "兩處統一用 r'PROMPT(?:_\\w+)?' 同時匹配 PROMPT 和 PROMPT_XXX"

  - issue: "動態 f-string prompt 無法提取"
    description: |
      含有 {variable} 的 f-string prompt 不是 module-level 常數，
      regex 無法靜態提取，且也無法寫回。
    solution: |
      ⭐ 推薦做法：將 f-string 轉換為模板常數 + {{variable}} 佔位符
      （詳見 script_prompt_conventions.unsupported.dynamic_fstring.migration_guide）

      舊方案（不推薦）：在 STAGE_META 設 prompt_key=None，顯示說明訊息。
      此方案無法在 UI 中編輯該 stage 的 prompt，體驗差。

  - issue: "JSON 快取與腳本不同步（舊版設計問題）"
    description: |
      舊版 get_prompts() 優先讀取 JSON 快取。
      當使用者透過 UI 「更新到腳本」後，.py 腳本已更新，
      但 JSON 快取仍是舊版，導致 UI 重新整理後顯示舊 prompt。
    solution: |
      ⭐ 根本解法：get_prompts() 永遠從 .py 腳本提取（不使用 JSON 快取）。
      JSON 檔案僅用於草稿暫存（drafts/），不作為讀取來源。
      update_script_prompts() 無需同步 JSON 快取。

  - issue: "預覽與執行的 prompt 組裝邏輯不一致"
    description: |
      UI 中有獨立的 generate_dynamic_variables() 函數來組裝預覽 prompt，
      stage 腳本 main() 有自己的組裝邏輯。
      兩份代碼可能漸漸出現不一致，導致預覽與執行結果不同。
    solution: |
      ⭐ 根本解法：每個 stage 腳本實作 build_prompts(year, month, prompt_texts=None)，
      UI 預覽和 main() 都呼叫此函數。
      刪除 UI 中的 generate_dynamic_variables() 等重複邏輯。
      （詳見 build_prompts_pattern 章節）

  - issue: "Windows 編碼問題"
    description: "subprocess 執行腳本時輸出含有非 ASCII 字元"
    solution: |
      subprocess.Popen 加上 encoding='utf-8', errors='replace'。
      腳本頭部加 sys.stdout.reconfigure(encoding='utf-8', errors='replace')。

  - issue: "Baseline 與腳本不同步（Stage 重新排序後）"
    description: |
      當 Stage 重新排序（如 Stage 2 和 Stage 4 互換）時，
      baseline JSON 檔名仍然用舊的 stage 編號，
      導致 baseline 與腳本不對應。
    solution: |
      重新排序 Stage 後，需要重新生成所有 baseline：
      1. 確認所有 stage 腳本的 prompt 內容正確
      2. 對每個 stage 執行 save_baseline()
      3. 驗證 baselines/ 目錄中的檔案與腳本一致
      ⚠️ Baseline 不可刪除，只能覆蓋更新

  - issue: "Streamlit session_state 與 widget key 衝突"
    description: |
      text_area 的 key 和 session_state 預設值需要精心設計，
      否則會出現「修改後切換 tab 就重置」的問題。
    solution: |
      用 st.session_state.get(key, default) 取得初始值，
      再把 key 同時作為 text_area 的 key，讓 Streamlit 自動管理。

  - issue: "缺少輸入驗證導致 Stage 執行中途失敗"
    description: |
      沒有 pre-flight check，Stage 在 API 呼叫後才發現輸入不存在，
      浪費 API 額度和時間。尤其是依賴前置 Stage 輸出的 Stage，
      當上月資料不存在時直接失敗，沒有任何提前警告。
    solution: |
      ⭐ 每個 Stage 腳本新增 check_inputs(year, month) 函數，
      在 main() 開頭和 Workflow 中統一呼叫。
      區分 ERROR（必要）和 WARNING（可選），讓使用者提前了解缺失。
      （詳見 input_validation 章節）

  - issue: "Stage 間依賴讀取的資料來源不一致"
    description: |
      當 Stage 有依賴關係（如 Stage 4 讀取 Stage 3 輸出）時，
      不同觸發路徑可能讀到不同資料：
      - UI 預覽中的 build_prompts() 讀取 temp/ 檔案
      - UI「文字輸入」區顯示活動版本（★）的內容
      - 一鍵 workflow 寫入 temp/ 但舊的活動版本可能較新
      導致 UI 預覽與顯示不一致、workflow 讀取到舊版本 ❌
    solution: |
      ⭐ 根本解法：建立 utils/stage_io.py，提供 read_stage_output(source) 單一函數。
      所有 build_prompts(dep_source) 內部統一呼叫此函數，
      source='active'（UI）尊重使用者選定的活動版本（★），
      source='temp'（workflow）只讀剛生成的 temp/ 檔案。
      （詳見 stage_output_reading 章節）

  - issue: "importlib 快取導致 UI reload 後仍用舊的 build_prompts()"
    description: |
      Streamlit UI 使用 importlib.import_module() 動態載入 stage 腳本。
      import_module() 會快取 module 在 sys.modules 中，
      即使腳本檔案已修改，後續 import 仍返回快取的舊版本。
      導致 UI 預覽使用舊的 build_prompts() 邏輯。
    solution: |
      在 get_build_prompts_fn() 中，檢查 module 是否已在 sys.modules，
      若已存在則使用 importlib.reload() 強制重新載入：
        if module_name in sys.modules:
            mod = importlib.reload(sys.modules[module_name])
        else:
            mod = importlib.import_module(module_name)

# ============================================================================
# 給 AI 的建構指引
# ============================================================================

ai_implementation_guide:
  step_1_analyze_project:
    description: |
      先分析目標專案的結構：
      - 有哪些 stage/step？
      - 每個 stage 呼叫哪些 API？
      - prompt 目前寫在哪裡？格式為何？
      - 哪些 prompt 是靜態的？哪些含有動態資料（需讀取 Excel 等）？
      - 哪些 prompt 依賴前序 stage 的 API 結果？

  step_2_standardize_prompts:
    description: |
      將各腳本的 prompt 統一為 module-level 常數 + {{variable}} 佔位符：
      - 單一 prompt 的 stage → PROMPT = """..."""
      - 多 prompt 的 stage → PROMPT_SECTION_A = """..."""
      - 動態 f-string → 轉換為模板常數（見 migration_guide）
        例：f"...{data}..." → PROMPT = """...{{data}}..."""
      - 依賴前序 API 的變數 → 使用 {{variable}} 佔位符，
        build_prompts() 中標記為 [需要前序 API 結果]，main() 中替換

  step_3_create_prompt_manager:
    description: |
      建立 PromptManager 類別：
      - 定義 prompt_files 映射表（所有 stage 都要有 mapping，包括以前設 None 的）
      - 實作 extract / get / update 方法
      - ⭐ get_prompts() 永遠從腳本提取，不優先讀取 JSON 快取
      - 實作 backup / restore 方法
      - 確保 extract 和 update 的 regex 一致
      - 實作 Baseline 管理方法（get_baseline, save_baseline, compare_with_baseline, restore_from_baseline）
      - 建立 baselines/ 目錄，Baseline 不可刪除僅能覆蓋

  step_4_add_build_prompts:
    description: |
      ⭐ 為每個 stage 腳本新增 build_prompts() 函數：
      - 將 main() 中的資料載入 + 變數替換邏輯提取到 build_prompts()
      - 函數簽名：build_prompts(year, month, prompt_texts=None)
      - 回傳：list[{'name': str, 'text': str}]
      - 修改 main() 呼叫 build_prompts()
      - UI 和 main() 共用同一個函數
      （詳見 build_prompts_pattern 章節）

  step_5_add_input_validation:
    description: |
      ⭐ 為每個 stage 腳本新增 check_inputs() 函數：
      - 函數簽名：check_inputs(year, month) → list[(level, message)]
      - 檢查所有必要輸入（圖片、Excel、前置 Stage 輸出）是否存在
      - 區分 ERROR（必要）和 WARNING（可選）
      - 在 main() 開頭呼叫並印出結果
      - 在 Workflow 中用 run_input_check() 統一呼叫
      - 依賴前置 Stage 的場景可自動補跑缺失依賴
      （詳見 input_validation 章節）

  step_6_integrate_ui:
    description: |
      在 Streamlit UI 中整合：
      - 定義 STAGE_META 配置（所有 stage 都設 prompt_key，不再設 None）
      - 建立 ui_prompts() 元件（含兩層次預覽功能）
      - 輕量預覽：render_prompt_with_variables()（靜態變數替換）
      - 完整預覽：get_build_prompts_fn() + build_prompts()（完整組裝）
      - ⭐ 刪除 generate_dynamic_variables() 等重複邏輯
      - 建立草稿管理功能（含刪除按鈕）
      - 建立 Baseline 比較功能（差異顯示、設為 Baseline、從 Baseline 還原）
      - 草稿記錄中置頂顯示 Baseline（可載入，不可刪除）
      - 建立版本管理功能
      - 每個 stage 頁面整合輸入管理 + 執行 + 版本記錄
      - 創建三種安全啟動腳本（安全/內網/開放模式）
      - 配置 .streamlit/config.toml 安全選項

  step_7_test:
    description: |
      測試要點：
      - 從腳本提取 prompt → 編輯 → 儲存草稿 → 載入草稿 → 刪除草稿
      - 更新到腳本 → 確認 .py 檔案真的被修改
      - 重整 UI → 確認顯示的是新版 prompt（不是 JSON 快取的舊版）
      - 完整預覽 → 確認內容與實際執行的 prompt 一致
      - 執行 stage → 確認用的是新 prompt
      - 版本快照 → 切換版本 → 確認組裝使用正確版本
      - Baseline 測試：
        - 設為 Baseline → 確認 baselines/ 目錄有對應 JSON
        - 修改 prompt → Baseline 比較顯示「⚠️ 與 Baseline 不同」
        - 從 Baseline 還原 → 確認腳本回復到 baseline 版本
        - 草稿記錄中 Baseline 置頂 → 只有載入按鈕、無刪除按鈕
      - 輸入驗證測試：
        - 缺少圖片 → check_inputs() 回傳 ERROR
        - 缺少 Excel → check_inputs() 回傳 WARNING
        - 缺少前置 Stage 輸出 → check_inputs() 回傳 ERROR
        - Workflow 中 run_input_check() 正確印出所有檢查結果

# ============================================================================
# 快速開始範例
# ============================================================================

quick_start_example:
  description: |
    以下是一個最小化的範例，展示如何使用此規格。
    假設你有一個 3 階段的報告生成流程。

  prompt_to_ai: |
    我有一個報告生成專案，包含 3 個階段：

    Stage 1: 數據摘要（1 個 API 呼叫）
      - 腳本: scripts/stage1_summary.py
      - Prompt 變數: PROMPT

    Stage 2: 詳細分析（2 個 API 呼叫）
      - 腳本: scripts/stage2_analysis.py
      - Prompt 變數: PROMPT_SECTION_A, PROMPT_SECTION_B

    Stage 3: 總結（1 個 API 呼叫）
      - 腳本: scripts/stage3_conclusion.py
      - Prompt 變數: PROMPT（動態，包含前面 stage 的輸出）

    請根據以下規格為我建立 Prompt 管理系統：
    [貼上此 YAML 全文]

    請生成：
    1. utils/prompt_manager.py（PromptManager 類別）
    2. Streamlit UI 的 Prompt 編輯器組件（含預覽功能）
    3. 版本管理相關函數
    4. 三種安全啟動腳本（start_ui.bat, start_ui_network.bat, start_ui_public.bat）
    5. .streamlit/config.toml 配置文件

  expected_file_structure: |
    project/
    ├── scripts/
    │   ├── stage1_summary.py        # PROMPT = """..."""
    │   ├── stage2_analysis.py       # PROMPT_SECTION_A, PROMPT_SECTION_B
    │   └── stage3_conclusion.py     # 動態 prompt
    ├── utils/
    │   └── prompt_manager.py        # AI 生成
    ├── prompts/
    │   ├── stage1_prompts.json      # 快取
    │   ├── stage2_prompts.json
    │   ├── baselines/               # Baseline 基準版本（不可刪除）
    │   ├── backups/                 # 自動備份
    │   └── drafts/                  # 草稿（可刪除）
    ├── temp/
    │   ├── versions/                # 版本快照
    │   └── active_versions_*.json   # 主要版本追蹤
    ├── .streamlit/
    │   ├── config.toml              # Streamlit 安全配置
    │   └── secrets.toml             # 密碼保護（可選）
    ├── start_ui.bat                 # 🟢 安全模式啟動（推薦）
    ├── start_ui_network.bat         # 🟡 內網模式啟動
    ├── start_ui_public.bat          # 🔴 開放模式啟動（有警告）
    └── ui_app.py                    # Streamlit UI

# ============================================================================
# 常見問題 FAQ
# ============================================================================

faq:
  q1:
    question: "這個系統和直接編輯 .py 文件有什麼差別？"
    answer: |
      直接編輯 .py：
      - 需要重啟應用才能看到效果
      - 沒有版本歷史（除非用 git）
      - 無法快速 A/B 測試

      使用此系統：
      - UI 即時預覽和編輯
      - 自動版本快照
      - 草稿暫存（不影響執行）
      - 可以比較不同版本的輸出結果

  q2:
    question: "為什麼不把 Prompt 存在資料庫？"
    answer: |
      設計原則是「Prompt 即程式碼」：
      - Prompt 是業務邏輯的一部分，應該在版本控制（Git）中
      - 資料庫會讓部署變複雜
      - 純檔案系統更容易備份和遷移
      - JSON 快取只是為了加速讀取，不是 single source of truth

  q3:
    question: "可以用於非 Streamlit 的專案嗎？"
    answer: |
      可以！PromptManager 類別不依賴 Streamlit。
      你可以：
      - 用 CLI 工具調用 PromptManager
      - 整合到其他 Web 框架（Flask、FastAPI）
      - 寫自己的編輯器 UI

  q4:
    question: "如何處理多語言 Prompt？"
    answer: |
      建議擴展為：
      PROMPT_EN = """..."""
      PROMPT_ZH = """..."""

      然後在 PromptManager 加上語言參數。

  q5:
    question: "版本快照會不會佔用很多空間？"
    answer: |
      Markdown 文本檔案很小（通常 < 100KB）。
      即使 100 個版本也只有 10MB。
      建議定期清理舊版本（保留最近 20 個）。

# ============================================================================
# Streamlit 安全啟動配置
# ============================================================================

streamlit_security:
  description: |
    Streamlit 預設會監聽所有網路介面（0.0.0.0），這意味著：
    - 會產生 Local、Network、External 三個 URL
    - External URL 會暴露在公網，任何人都可訪問
    - 如果沒有密碼保護，系統的所有功能都會被暴露

    提供三種啟動模式，適應不同的使用場景和安全需求。

  security_levels:
    safe_mode:
      name: "🟢 安全模式（推薦）"
      description: "僅本機訪問，最安全"
      script_name: "start_ui.bat"
      config: |
        # 監聽地址：localhost
        python -W ignore -m streamlit run ui_app.py --server.address localhost --server.headless true 2>nul
      features:
        - "只有本機能訪問"
        - "無 External URL 暴露"
        - "資料不會外洩"
        - "防止他人誤操作"
      use_cases:
        - "日常開發和使用"
        - "包含敏感資料"
        - "個人工作環境"

    network_mode:
      name: "🟡 區域網路模式"
      description: "內網訪問，中等安全"
      script_name: "start_ui_network.bat"
      config: |
        # 監聽地址：0.0.0.0（所有介面）
        python -W ignore -m streamlit run ui_app.py --server.address 0.0.0.0 --server.headless true 2>nul
      features:
        - "同網路的設備可訪問"
        - "有 Network URL（內網 IP）"
        - "無 External URL（需路由器設定）"
        - "同網路的人可執行所有操作"
      use_cases:
        - "手機/平板測試 UI"
        - "內部團隊協作"
        - "區域網路演示"
      warnings:
        - "確認當前網路是否可信"
        - "不要在公共 Wi-Fi 使用"
        - "使用完畢立即關閉"

    public_mode:
      name: "🔴 完全開放模式（高風險）"
      description: "全世界可訪問，僅測試用"
      script_name: "start_ui_public.bat"
      config: |
        # 監聽地址：0.0.0.0 + 顯示警告訊息
        @echo off
        echo 🚨 警告：完全開放模式 🚨
        echo 任何知道你 IP 的人都能訪問系統
        pause
        python -W ignore -m streamlit run ui_app.py --server.address 0.0.0.0 --server.headless true 2>nul
      features:
        - "產生 External URL（公網 IP）"
        - "全世界任何人都可訪問"
        - "可執行腳本、查看資料、消耗 API"
      use_cases:
        - "短期測試（幾分鐘內）"
        - "受控演示環境"
      warnings:
        - "極高安全風險"
        - "不要長時間運行"
        - "不要包含敏感資料"
        - "建議設置密碼保護"

  streamlit_config_file:
    path: ".streamlit/config.toml"
    description: "Streamlit 配置文件，設定安全選項"
    example: |
      [logger]
      level = "error"
      messageFormat = "%(asctime)s %(message)s"

      [client]
      showErrorDetails = false

      [runner]
      magicEnabled = true

      [server]
      # 安全設定：只允許本機訪問（禁用外部訪問）
      address = "localhost"
      port = 8501
      headless = true

      # 防止跨站請求偽造
      enableCORS = false
      enableXsrfProtection = true

  startup_scripts:
    description: "為不同安全模式創建對應的啟動腳本"
    windows_batch_files:
      safe_mode: |
        @echo off
        REM 啟動 Streamlit UI - 安全模式
        echo ===================================
        echo 系統啟動中...
        echo 安全模式：僅本機訪問
        echo ===================================
        python -W ignore -m streamlit run ui_app.py --server.address localhost --server.headless true 2>nul

      network_mode: |
        @echo off
        REM 啟動 Streamlit UI - 區域網路模式
        echo ===================================
        echo ⚠️ 警告：區域網路模式
        echo 同網路的人都能訪問！
        echo ===================================
        python -W ignore -m streamlit run ui_app.py --server.address 0.0.0.0 --server.headless true 2>nul

      public_mode: |
        @echo off
        REM 啟動 Streamlit UI - 完全開放模式
        echo ========================================
        echo  🚨 警告：完全開放模式 🚨
        echo ========================================
        echo.
        echo 此模式將開放以下訪問方式：
        echo   ✓ 本機訪問 (localhost)
        echo   ✓ 區域網路訪問 (Network URL)
        echo   ✓ 外部網路訪問 (External URL)
        echo.
        echo ⚠️  任何知道你 IP 的人都能訪問系統
        echo ⚠️  可以執行腳本、查看資料、消耗 API
        echo ⚠️  建議僅在測試或演示時使用
        echo.
        echo ========================================
        pause
        echo.
        echo 正在啟動...
        python -W ignore -m streamlit run ui_app.py --server.address 0.0.0.0 --server.headless true 2>nul

    linux_shell_scripts:
      safe_mode: |
        #!/bin/bash
        # 啟動 Streamlit UI - 安全模式
        echo "==================================="
        echo "系統啟動中..."
        echo "安全模式：僅本機訪問"
        echo "==================================="
        python -W ignore -m streamlit run ui_app.py --server.address localhost --server.headless true 2>/dev/null

      network_mode: |
        #!/bin/bash
        # 啟動 Streamlit UI - 區域網路模式
        echo "==================================="
        echo "⚠️  警告：區域網路模式"
        echo "同網路的人都能訪問！"
        echo "==================================="
        python -W ignore -m streamlit run ui_app.py --server.address 0.0.0.0 --server.headless true 2>/dev/null

  verification:
    description: "如何驗證當前的安全模式"
    terminal_check:
      description: "檢查終端輸出的 URL"
      safe_mode_output: |
        ✅ Local URL: http://localhost:8501
        (只有 1 個 URL，安全)

      network_mode_output: |
        ✅ Local URL:   http://localhost:8501
        ⚠️ Network URL: http://192.168.1.100:8501
        (2 個 URL，內網可訪問)

      public_mode_output: |
        ✅ Local URL:    http://localhost:8501
        ⚠️ Network URL:  http://192.168.1.100:8501
        🚨 External URL: http://27.247.35.9:8501  ← 危險！全世界可訪問
        (3 個 URL，完全開放)

    netstat_check:
      description: "使用 netstat 命令檢查監聽狀態"
      command: "netstat -ano | findstr :8501"
      safe_mode_output: |
        TCP    127.0.0.1:8501    0.0.0.0:0    LISTENING
        (只監聽 localhost，安全)

      public_mode_output: |
        TCP    0.0.0.0:8501      0.0.0.0:0    LISTENING
        (監聽所有 IP，開放)

  best_practices:
    - "預設使用安全模式（start_ui.bat）"
    - "只在需要時才使用網路/開放模式"
    - "使用完畢立即關閉（Ctrl+C）"
    - "開放模式不要超過 10 分鐘"
    - "如需遠端訪問，使用 Streamlit Cloud + 密碼保護或 VPN"
    - "定期檢查 .env 是否在 .gitignore 中"
    - "在 README 中說明安全啟動方式"

  remote_access_alternatives:
    description: "如果需要遠端訪問，不要使用開放模式，改用以下方案"
    options:
      - name: "Streamlit Cloud + 密碼保護"
        description: "部署到 share.streamlit.io，設置密碼"
        pros: ["免費", "HTTPS 加密", "24/7 運行", "內建認證"]
        cons: ["資料在雲端", "免費版有資源限制"]

      - name: "VPN 訪問"
        description: "使用 Tailscale 或 ZeroTier"
        pros: ["點對點加密", "只有授權設備可訪問", "免費（個人使用）"]
        cons: ["需要安裝軟體", "稍微複雜"]

      - name: "SSH 隧道"
        description: "ssh -L 8501:localhost:8501 user@server"
        pros: ["SSH 加密", "不需額外軟體", "適合臨時訪問"]
        cons: ["需要 SSH 存取權", "連線斷開就無法訪問"]

